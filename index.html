<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanaman Ku</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(#7cc36c,#cfe9c9);
    margin:0;
    padding:0;
}

.container{
    width:90%;
    max-width:500px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:white;
}

.search{
    width:100%;
    padding:15px;
    border-radius:20px;
    border:none;
    margin-top:10px;
}

.btn{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:20px;
    background:linear-gradient(#6fd06a,#3fa24a);
    color:white;
    font-size:16px;
}

.card{
    background:white;
    border-radius:20px;
    padding:15px;
    margin-top:15px;
    display:flex;
    align-items:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
    width:70px;
    margin-right:15px;
}

.card h3{
    margin:0;
}

.card button{
    margin-top:8px;
    padding:8px 15px;
    border:none;
    border-radius:10px;
    background:#3aa1d8;
    color:white;
}

.note{
    background:#fff4cc;
    border-radius:20px;
    padding:15px;
    margin-top:20px;
}

.note h3{
    margin-top:0;
}

</style>
</head>

<body>

<div class="container">

<h1>TANAMAN KU</h1>

<input class="search" placeholder="Masukkan tanaman yang ingin ditanam / dirawat">

<button class="btn">+ Tambah Tanaman Baru</button>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/2909/2909769.png">
<div>
<h3>Cabe Merah</h3>
<button>Catat Perkembangan</button>
</div>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/415/415733.png">
<div>
<h3>Mangga Harum Manis</h3>
<button>Catat Perkembangan</button>
</div>
</div>

<div class="note">
<h3>Catatan Perawatan</h3>
<p>💧 Jadwal menyiram</p>
<p>🌱 Jadwal pupuk</p>
<p>📅 Catatan perkembangan tanaman</p>
</div>

</div>

</body>
</html>
